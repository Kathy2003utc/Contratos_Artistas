<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Sistema - Cliente</a>
    <div>
      <span class="navbar-text text-white me-3">Hola, {{ usuario.first_name }} {{ usuario.last_name }}</span>
      <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <h1>{{ mensaje }}</h1>

    <div class="card mt-4">
      <div class="card-body">
        <h5 class="card-title">Tu información personal</h5>
        <p><strong>Usuario:</strong> {{ usuario.username }}</p>
        <p><strong>Correo:</strong> {{ usuario.email }}</p>
        <p><strong>Teléfono:</strong> {{ usuario.telefono }}</p>
        <p><strong>Dirección:</strong> {{ usuario.direccion }}</p>
        <!-- Agrega más datos que quieras mostrar -->
      </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
