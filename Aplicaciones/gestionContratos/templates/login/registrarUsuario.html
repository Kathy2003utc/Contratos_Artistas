<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Íconos opcionales -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #224abe);
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .bg-register-image {
            background-image: url('https://source.unsplash.com/random/500x700?music');
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">

<div class="container">
    <div class="card o-hidden shadow-lg">
        <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-block bg-register-image"></div>
            <div class="col-lg-7">
                <div class="p-5">
                    <h1 class="h4 text-center text-primary mb-4">¡Crear una cuenta!</h1>

                    <form class="row g-3" action="/registrarUsuario" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Campos comunes -->
                        <div class="col-md-6">
                            <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="first_name" class="form-control" placeholder="Nombres" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="last_name" class="form-control" placeholder="Apellidos" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" name="email" class="form-control" placeholder="Correo electrónico" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="telefono" class="form-control" placeholder="Teléfono" required>
                        </div>
                        <div class="col-md-6">
                            <input type="file" name="foto_perfil" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12">
                            <textarea name="direccion" class="form-control" placeholder="Dirección" required></textarea>
                        </div>

                        <!-- Rol -->
                        <div class="col-12">
                            <label for="rol">Selecciona tu rol:</label>
                            <select class="form-select" name="rol" id="rol" required>
                                <option value="">-- Selecciona --</option>
                                <option value="Cliente">Cliente</option>
                                <option value="Artista">Artista</option>
                            </select>
                        </div>

                        <!-- Campos extras para Artista -->
                        <div id="campos-artista" style="display: none;">
                            <div class="col-12 mt-3">
                                <label>Portafolio (PDF):</label>
                                <input type="file" name="portafolio_pdf" class="form-control" accept="application/pdf">
                            </div>
                            <div class="col-md-6">
                                <input type="url" name="facebook_url" class="form-control" placeholder="URL de Facebook">
                            </div>
                            <div class="col-md-6">
                                <input type="url" name="x_url" class="form-control" placeholder="URL de X (Twitter)">
                            </div>
                            <div class="col-12">
                                <input type="url" name="web_url" class="form-control" placeholder="URL de página web">
                            </div>
                        </div>

                        <!-- Contraseñas -->
                        <div class="col-md-6 mt-3">
                            <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <div class="col-md-6 mt-3">
                            <input type="password" name="password2" class="form-control" placeholder="Repetir contraseña" required>
                        </div>

                        <!-- Botón -->
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <a class="small text-white" href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div class="text-center">
                        <a class="small text-white" href="/login">¿Ya tienes una cuenta? ¡Inicia sesión!</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap y JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Mostrar u ocultar campos según el rol
    document.getElementById('rol').addEventListener('change', function () {
        const extras = document.getElementById('campos-artista');
        extras.style.display = this.value === 'Artista' ? 'block' : 'none';
    });
</script>
</body>
</html>
