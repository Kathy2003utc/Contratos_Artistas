<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #224abe);
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.2);
        }
        .bg-login-image {
            background: url('https://source.unsplash.com/random/600x800');
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card login-card">
                <div class="row g-0">
                    <!-- Imagen lateral -->
                    <div class="col-md-6 d-none d-md-block bg-login-image"></div>

                    <!-- Formulario -->
                    <div class="col-md-6">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <h2 class="text-primary fw-bold">Bienvenido</h2>
                                <p class="text-muted">Inicia sesión para continuar</p>
                            </div>

                            <form method="post" action="{% url 'iniciar_sesion' %}">

                                {% csrf_token %}
                                {% if form.errors %}
                                    <div class="alert alert-danger" role="alert">
                                        Usuario o contraseña incorrectos.
                                    </div>
                                {% endif %}
                                
                                <div class="form-group mb-3">
                                    <label for="username">Correo o usuario</label>
                                    <input type="text" name="username" class="form-control" placeholder="Tu usuario o email" required>
                                </div>

                                <div class="form-group mb-4">
                                    <label for="password">Contraseña</label>
                                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                            </div>
                            <div class="text-center mt-2">
                                <a href="{% url 'registro' %}" class="text-decoration-none small">¿No tienes una cuenta? Regístrate aquí</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
     </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
