<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar Perfil - Artista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4 class="mb-0">Editar Perfil - Artista</h4>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="first_name" class="form-label">Nombre:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="first_name"
                        name="first_name"
                        value="{{ usuario.first_name }}"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="last_name" class="form-label">Apellido:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="last_name"
                        name="last_name"
                        value="{{ usuario.last_name }}"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email:</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        value="{{ usuario.email }}"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="telefono"
                        name="telefono"
                        value="{{ usuario.telefono }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="direccion" class="form-label">Dirección:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="direccion"
                        name="direccion"
                        value="{{ usuario.direccion }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="especialidad" class="form-label">Especialidad:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="especialidad"
                        name="especialidad"
                        value="{{ usuario.especialidad }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="redes_sociales" class="form-label">Redes Sociales:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="redes_sociales"
                        name="redes_sociales"
                        value="{{ usuario.redes_sociales }}"
                        placeholder="Ejemplo: Instagram, Facebook, etc."
                    />
                </div>
                <div class="mb-3">
                    <label for="foto_perfil" class="form-label">Foto de Perfil:</label>
                    <input type="file" class="form-control" id="foto_perfil" name="foto_perfil" />
                    {% if usuario.foto_perfil %}
                    <img
                        src="{{ usuario.foto_perfil.url }}"
                        alt="Foto de perfil"
                        class="img-thumbnail mt-2"
                        style="max-width: 150px;"
                    />
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-success">Guardar Cambios</button>
                <a href="{% url 'ver_perfil' %}" class="btn btn-secondary ms-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>

<!-- Mensajes con SweetAlert2 -->
{% if messages %}
    {% for mensaje in messages %}
    <script>
        Swal.fire({
            icon: 'success',
            title: '¡Perfecto!',
            text: '{{ mensaje }}',
            confirmButtonText: 'Aceptar'
        });
    </script>
    {% endfor %}
{% endif %}
</body>
</html>
